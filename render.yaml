services:
  - type: web
    name: cymelle-api
    runtime: docker
    dockerfilePath: ./orders-backend/Dockerfile
    dockerContext: ./orders-backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: SEED_DATA
        value: false
      - key: DATABASE_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://cymelle-web.onrender.com

  - type: web
    name: cymelle-web
    runtime: docker
    dockerfilePath: ./orders-frontend/Dockerfile
    dockerContext: ./orders-frontend
    plan: starter
    envVars:
      - key: PORT
        value: 3000
      - key: VITE_API_BASE_URL
        value: https://cymelle-api.onrender.com/api
