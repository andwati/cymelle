spring:
  datasource:
    url: jdbc:h2:mem:orderfaretestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

inventory:
  low-stock-threshold: 10

fare:
  base-fare: 100.00
  per-km-rate: 50.00
  minimum-fare: 150.00
  default-surge-multiplier: 1.0
  currency: KES

app:
  seed-data: false