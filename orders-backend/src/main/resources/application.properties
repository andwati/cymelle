server.port=8080

spring.application.name=orders

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

inventory.low-stock-threshold=${LOW_STOCK_THRESHOLD:10}

fare.base-fare=${FARE_BASE_FARE:100.00}
fare.per-km-rate=${FARE_PER_KM_RATE:50.00}
fare.minimum-fare=${FARE_MINIMUM_FARE:150.00}
fare.default-surge-multiplier=${FARE_DEFAULT_SURGE_MULTIPLIER:1.0}
fare.currency=${FARE_CURRENCY:KES}

app.seed-data=${SEED_DATA:true}
